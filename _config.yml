# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: COGS 108
email: sepeng@ucsd.edu
description: >- # this means to ignore newlines until "baseurl:"
  COGS 108, Spring 2026 at UC San Diego
title: COGS 108
tagline: Data Science in Practice

# Site URL. `baseurl` is injected at build time by the GitHub Actions workflow
# via `--baseurl "${{ steps.pages.outputs.base_path }}"`, so it adapts
# automatically to whatever GitHub Pages is configured to serve:
#   - kshannon-ucsd.github.io/dsc40a/  -> base_path "/dsc40a"
#   - dsc40a.com (custom domain via CNAME) -> base_path ""
# Only `url` needs to change if you switch hosting. For the github.io default,
# the value below is correct. If you add the CNAME for dsc40a.com, change
# `url` to `https://dsc40a.com`.
url: https://sierrap612.github.io
baseurl: /cogs108


###### Build settings
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-feed

search_enabled: true



markdown: kramdown
kramdown:
  math_engine: mathjax
  # optional
  input: GFM
  syntax_highlighter: rouge




# exclude: ["./data", "../vendor/*"]

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .data/ #user specific excludes here...
  - docs
  - dev-docs

# Aux link for the upper right navigation
aux_links:
  # "Template Repository": "https://www.github.com/kshannon/ucsd-dsc40a"
  "🙋 Piazza": "https://piazza.com"
  "💯 Gradescope": "https://www.gradescope.com"
  "💪 Practice": "https://practice.dsc40a.com"

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: true

# Change this to choose where to pick data from
data_folder: sp26

# Config JTD UI elements here
# Color scheme currently only supports "dark", "light"/nil (default), or a custom scheme that you define
color_scheme: dark

callouts_level: quiet # or loud
callouts:
  highlight:
    title: Caution
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"


collections:
  demos:
    output: true
    permalink: /demos/:path
